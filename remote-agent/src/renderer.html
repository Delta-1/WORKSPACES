<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Workspace Acesso Remoto</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #0b0f16; color: #cbd5e1; padding: 22px; text-align: center; }
      h3 { margin: 4px 0 4px; color: #fff; font-size: 17px; }
      .sub { font-size: 12px; color: #94a3b8; margin: 0 0 16px; }
      .code-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
      .code {
        font-size: 34px; font-weight: 800; letter-spacing: 6px; color: #34d399;
        background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 16px 10px;
        user-select: all; font-variant-numeric: tabular-nums;
      }
      .copy { margin-top: 10px; padding: 9px 14px; border: 0; border-radius: 9px; background: #1f2937;
        color: #e5e7eb; font-weight: 600; cursor: pointer; font-size: 13px; }
      .copy:hover { background: #374151; }
      #status { font-size: 12px; margin-top: 16px; color: #64748b; }
      .hint { font-size: 11px; color: #64748b; margin-top: 14px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h3>Workspace — Suporte Remoto</h3>
    <p class="sub">Este computador está pronto para receber suporte técnico.</p>

    <div class="code-label">Seu código de suporte</div>
    <div class="code" id="my-code">— — —</div>
    <button class="copy" id="copy">Copiar código</button>

    <p id="status">Iniciando…</p>

    <p class="hint">
      Informe este código ao seu suporte.<br />
      O programa continua rodando na bandeja e sobe junto com o Windows —
      não precisa deixar esta janela aberta.
    </p>

    <script src="./renderer.js"></script>
  </body>
</html>
