name: Build Remote Agent (.exe)

# Gera o .exe do agente de Acesso Remoto automaticamente.
# Rode manualmente em Actions -> "Build Remote Agent (.exe)" -> Run workflow,
# ou automaticamente quando algo em remote-agent/ muda.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "remote-agent/**"
      - ".github/workflows/build-remote-agent.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: remote-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preparar config.json (valores públicos)
        shell: bash
        run: cp config.public.json config.json

      - name: Instalar dependências
        run: npm install

      - name: Gerar instalador (.exe NSIS)
        run: npm run dist:win

      - name: Publicar o instalador como artefato
        uses: actions/upload-artifact@v4
        with:
          name: WorkspaceAcessoRemoto-exe
          path: remote-agent/dist/WorkspaceAcessoRemoto-Setup.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remote-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Preparar config.json (valores públicos)
        shell: bash
        run: cp config.public.json config.json
      - name: Instalar dependências
        run: npm install
      - name: Gerar AppImage (Linux)
        run: npm run dist:linux
      - name: Publicar o AppImage como artefato
        uses: actions/upload-artifact@v4
        with:
          name: WorkspaceAcessoRemoto-linux
          path: remote-agent/dist/*.AppImage
          if-no-files-found: error

  # Publica uma RELEASE do GitHub com os instaladores anexados — assim aparece o
  # "baixe o executável aqui" na aba Releases, e o link /releases/latest sempre
  # aponta para a versão mais nova (dá pra colar direto no publicador do site).
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar os artefatos gerados
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publicar Release com os instaladores
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agente-${{ github.run_number }}
          name: Acesso Remoto — build ${{ github.run_number }}
          body: |
            Instaladores do agente de Acesso Remoto (gerados automaticamente).

            - **Windows:** `WorkspaceAcessoRemoto-Setup.exe` (instala e atualiza sozinho)
            - **Linux:** `*.AppImage`

            Para publicar a atualização: cole o link do `.exe`/`.AppImage` desta release
            no site em **Configurações → Instalação → Publicar atualização**.
          files: |
            dist/**/WorkspaceAcessoRemoto-Setup.exe
            dist/**/*.AppImage
          fail_on_unmatched_files: false
